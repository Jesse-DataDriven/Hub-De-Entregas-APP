<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Portal de Gestão</title>
<meta name="theme-color" content="#1B2430" />
<link rel="manifest" href="manifest.json" />
<link rel="icon" href="icons/icon-192.png" />
<link rel="apple-touch-icon" href="icons/icon-192.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#1B2430;
    --ink-2:#242F3D;
    --paper:#F5F2EA;
    --paper-2:#EAE5D8;
    --amber:#C98A3B;
    --amber-soft:#E4B27B;
    --slate:#5B6776;
    --line:#D8D2C2;
    --radius:14px;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    margin:0;
    background:var(--paper);
    color:var(--ink);
    font-family:'Inter', system-ui, sans-serif;
    overscroll-behavior:none;
  }
  #app{ min-height:100vh; min-height:100dvh; display:flex; flex-direction:column; }

  /* ---------- HEADER ---------- */
  header.top{
    background:var(--ink);
    color:var(--paper);
    padding:calc(env(safe-area-inset-top,0px) + 18px) 20px 18px;
    position:sticky; top:0; z-index:20;
  }
  header.top .eyebrow{
    font-family:'IBM Plex Mono', monospace;
    font-size:11px; letter-spacing:.14em; text-transform:uppercase;
    color:var(--amber-soft); margin-bottom:6px;
  }
  header.top h1{
    font-family:'Fraunces', serif;
    font-weight:600; font-size:26px; margin:0;
    letter-spacing:-0.01em;
  }
  .backbar{
    display:flex; align-items:center; gap:12px;
  }
  .backbtn{
    appearance:none; border:1px solid rgba(245,242,234,.25);
    background:rgba(245,242,234,.06); color:var(--paper);
    width:36px; height:36px; border-radius:10px;
    display:flex; align-items:center; justify-content:center;
    font-size:18px; cursor:pointer; flex-shrink:0;
  }
  .backbtn:active{ background:rgba(245,242,234,.16); }

  /* ---------- HOME / FOLDER LIST ---------- */
  main{ flex:1; overflow:hidden; display:flex; flex-direction:column; }
  #view-home{ padding:18px 16px 90px; overflow-y:auto; }
  .folder-tab{
    display:flex; align-items:center; gap:14px;
    background:var(--ink);
    border-radius:var(--radius);
    padding:16px 16px;
    margin-bottom:12px;
    cursor:pointer;
    position:relative;
    border-left:5px solid var(--amber);
    transition:transform .12s ease;
  }
  .folder-tab:active{ transform:scale(.98); }
  .folder-code{
    font-family:'IBM Plex Mono', monospace;
    font-size:13px; font-weight:500;
    color:var(--ink);
    background:var(--amber);
    padding:6px 9px;
    border-radius:8px;
    min-width:38px; text-align:center;
    flex-shrink:0;
  }
  .folder-meta{ flex:1; min-width:0; }
  .folder-meta .name{
    font-family:'Fraunces', serif; font-weight:600;
    font-size:17px; color:var(--paper); line-height:1.25;
  }
  .folder-meta .count{
    font-size:12.5px; color:var(--amber-soft); margin-top:2px;
    font-family:'IBM Plex Mono', monospace;
  }
  .chev{ color:var(--paper); opacity:.45; font-size:20px; }

  /* ---------- FOLDER DETAIL (item list) ---------- */
  #view-folder{ display:none; padding:16px 16px 90px; overflow-y:auto; }
  .item-row{
    display:flex; align-items:center; gap:12px;
    background:#fff;
    border:1px solid var(--line);
    border-radius:12px;
    padding:14px 14px;
    margin-bottom:10px;
    cursor:pointer;
  }
  .item-row:active{ background:var(--paper-2); }
  .item-dot{
    width:8px; height:8px; border-radius:50%;
    background:var(--amber); flex-shrink:0;
  }
  .item-title{ font-size:15px; font-weight:500; color:var(--ink); flex:1; }
  .item-open{ font-size:12px; color:var(--slate); font-family:'IBM Plex Mono', monospace; }
  .empty-state{
    text-align:center; padding:48px 20px; color:var(--slate);
  }
  .empty-state .glyph{
    font-family:'Fraunces', serif; font-size:34px; color:var(--amber);
    margin-bottom:10px;
  }
  .empty-state p{ font-size:14px; line-height:1.5; margin:0 auto; max-width:280px; }

  /* ---------- VIEWER (iframe) ---------- */
  #view-frame{ display:none; flex:1; flex-direction:column; }
  #view-frame .frame-tools{
    display:flex; gap:10px; padding:10px 14px;
    background:var(--paper-2); border-bottom:1px solid var(--line);
  }
  #view-frame .frame-tools a{
    font-family:'IBM Plex Mono', monospace; font-size:12px;
    color:var(--slate); text-decoration:none;
    display:flex; align-items:center; gap:5px;
  }
  #view-frame iframe{
    flex:1; width:100%; border:0; background:#fff;
  }
  .frame-fallback{
    flex:1; display:flex; align-items:center; justify-content:center;
    flex-direction:column; gap:14px; padding:30px; text-align:center;
    color:var(--slate); font-size:14px;
  }
  .frame-fallback a.btn{
    background:var(--ink); color:var(--paper); text-decoration:none;
    padding:12px 20px; border-radius:10px; font-weight:500; font-size:14px;
  }

  /* install toast */
  #installToast{
    position:fixed; left:16px; right:16px; bottom:16px;
    background:var(--ink); color:var(--paper);
    border-radius:12px; padding:14px 16px;
    display:none; align-items:center; justify-content:space-between; gap:12px;
    box-shadow:0 8px 24px rgba(0,0,0,.25); z-index:50;
  }
  #installToast span{ font-size:13px; line-height:1.4; }
  #installToast button{
    background:var(--amber); border:0; color:var(--ink);
    padding:9px 14px; border-radius:8px; font-weight:600; font-size:13px;
    cursor:pointer; flex-shrink:0;
  }
</style>
</head>
<body>
<div id="app">

  <header class="top">
    <div class="backbar" id="headerBar">
      <div style="flex:1;">
        <div class="eyebrow" id="eyebrow">Portal · 8 áreas</div>
        <h1 id="pageTitle">Gestão &amp; Análises</h1>
      </div>
    </div>
  </header>

  <main>
    <div id="view-home"></div>
    <div id="view-folder"></div>
    <div id="view-frame">
      <div class="frame-tools">
        <a href="#" id="openExternal" target="_blank" rel="noopener">↗ Abrir em nova aba</a>
      </div>
      <iframe id="contentFrame" title="conteúdo"></iframe>
    </div>
  </main>

  <div id="installToast">
    <span>Instale este portal na tela inicial do seu celular para acesso rápido.</span>
    <button id="installBtn">Instalar</button>
  </div>
</div>

<script src="data.js"></script>
<script>
(function(){
  const $home = document.getElementById('view-home');
  const $folder = document.getElementById('view-folder');
  const $frame = document.getElementById('view-frame');
  const $iframe = document.getElementById('contentFrame');
  const $openExternal = document.getElementById('openExternal');
  const $eyebrow = document.getElementById('eyebrow');
  const $title = document.getElementById('pageTitle');
  const $headerBar = document.getElementById('headerBar');

  function renderHome(){
    $home.style.display = 'block';
    $folder.style.display = 'none';
    $frame.style.display = 'none';
    $eyebrow.textContent = 'Portal · ' + FOLDERS.length + ' áreas';
    $title.textContent = 'Gestão & Análises';
    $headerBar.querySelector('.backbtn')?.remove();

    $home.innerHTML = FOLDERS.map((f, i) => `
      <div class="folder-tab" data-idx="${i}">
        <div class="folder-code">${f.code}</div>
        <div class="folder-meta">
          <div class="name">${f.name}</div>
          <div class="count">${f.items.length} ${f.items.length === 1 ? 'item' : 'itens'}</div>
        </div>
        <div class="chev">›</div>
      </div>
    `).join('');

    $home.querySelectorAll('.folder-tab').forEach(el => {
      el.addEventListener('click', () => renderFolder(parseInt(el.dataset.idx)));
    });
  }

  function addBackButton(onClick){
    if ($headerBar.querySelector('.backbtn')) return;
    const btn = document.createElement('button');
    btn.className = 'backbtn';
    btn.innerHTML = '←';
    btn.addEventListener('click', onClick);
    $headerBar.prepend(btn);
  }

  function renderFolder(idx){
    const f = FOLDERS[idx];
    $home.style.display = 'none';
    $frame.style.display = 'none';
    $folder.style.display = 'block';
    $eyebrow.textContent = f.code + ' · ' + f.items.length + ' itens';
    $title.textContent = f.name;
    addBackButton(renderHome);

    if (!f.items.length){
      $folder.innerHTML = `
        <div class="empty-state">
          <div class="glyph">${f.code}</div>
          <p>Nenhum item cadastrado ainda nesta pasta. Adicione URLs em <strong>data.js</strong>.</p>
        </div>`;
      return;
    }

    $folder.innerHTML = f.items.map((it, i) => `
      <div class="item-row" data-idx="${i}">
        <div class="item-dot"></div>
        <div class="item-title">${it.title}</div>
        <div class="item-open">abrir ›</div>
      </div>
    `).join('');

    $folder.querySelectorAll('.item-row').forEach(el => {
      el.addEventListener('click', () => renderViewer(f, parseInt(el.dataset.idx)));
    });
  }

  function renderViewer(folder, itemIdx){
    const item = folder.items[itemIdx];
    const src = item.url || item.html;
    $home.style.display = 'none';
    $folder.style.display = 'none';
    $frame.style.display = 'flex';
    $eyebrow.textContent = folder.code + ' · ' + folder.name;
    $title.textContent = item.title;
    addBackButton(() => renderFolder(FOLDERS.indexOf(folder)));

    $iframe.src = src;
    $openExternal.href = src;
  }

  renderHome();

  // ---- PWA install prompt ----
  let deferredPrompt;
  const toast = document.getElementById('installToast');
  const installBtn = document.getElementById('installBtn');
  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    toast.style.display = 'flex';
  });
  installBtn?.addEventListener('click', async () => {
    toast.style.display = 'none';
    if (deferredPrompt){ deferredPrompt.prompt(); await deferredPrompt.userChoice; deferredPrompt = null; }
  });
  window.addEventListener('appinstalled', () => { toast.style.display = 'none'; });

  if ('serviceWorker' in navigator){
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    });
  }
})();
</script>
</body>
</html>
