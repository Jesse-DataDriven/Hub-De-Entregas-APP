<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Hub de Entregas | Agibank</title>
<meta name="theme-color" content="#000f44" />
<link rel="manifest" href="manifest.json" />
<link rel="icon" href="icons/icon-192.png" />
<link rel="apple-touch-icon" href="icons/icon-192.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{
    --azul:#0064f5;
    --azul-escuro:#000f44;
    --verde:#77df40;
    --branco:#fff;
    --cinza:#f5f5f5;
    --texto:#101828;
    --muted:#667085;
    --borda:#dce7f5;
    --shadow:0 12px 36px rgba(0,15,68,.11);
    --radius:14px;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent; margin:0; padding:0;}
  html,body{height:100%;}
  body{
    background:linear-gradient(180deg,#fff 0%,#f0f6ff 100%);
    color:var(--texto);
    font-family:'Inter', system-ui, sans-serif;
    overscroll-behavior:none;
    -webkit-font-smoothing:antialiased;
  }
  #app{ min-height:100vh; min-height:100dvh; display:flex; flex-direction:column; }

  header.top{
    background:rgba(255,255,255,.96);
    backdrop-filter:blur(14px);
    border-bottom:1px solid var(--borda);
    padding:calc(env(safe-area-inset-top,0px) + 12px) 16px 12px;
    position:sticky; top:0; z-index:20;
  }
  .backbar{ display:flex; align-items:center; gap:12px; }
  .brand-logo{ height:20px; width:auto; display:block; flex-shrink:0; }
  .backbtn{
    appearance:none; border:1px solid var(--borda);
    background:#fff; color:var(--azul-escuro);
    width:34px; height:34px; border-radius:10px;
    display:flex; align-items:center; justify-content:center;
    font-size:17px; cursor:pointer; flex-shrink:0;
  }
  .backbtn:active{ background:var(--cinza); }
  .head-text{ flex:1; min-width:0; }
  .head-text .eyebrow{
    font-size:10px; font-weight:800; letter-spacing:.12em; text-transform:uppercase;
    color:var(--azul); margin-bottom:2px;
  }
  .head-text h1{
    font-family:'Inter', sans-serif; font-weight:900; font-size:19px;
    color:var(--azul-escuro); letter-spacing:-.3px; line-height:1.15;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }

  main{ flex:1; overflow:hidden; display:flex; flex-direction:column; }
  #view-home{ padding:16px 16px 90px; overflow-y:auto; }

  .hero{
    border-radius:16px;
    background:linear-gradient(125deg,#00114d 0%,#001a6e 40%,#000f44 72%,#012080 100%);
    color:#fff; padding:20px 20px 18px; margin-bottom:16px;
    box-shadow:0 14px 40px rgba(0,15,68,.26);
    position:relative; overflow:hidden;
  }
  .hero::after{
    content:""; position:absolute; right:-50px; top:-50px;
    width:200px; height:200px; border-radius:50%;
    background:radial-gradient(circle,rgba(119,223,64,.22),transparent 70%);
    pointer-events:none;
  }
  .hero-inner{ position:relative; z-index:2; }
  .hero .badge{
    display:inline-flex; align-items:center; gap:6px;
    font-size:10px; font-weight:900; letter-spacing:.12em; text-transform:uppercase;
    color:var(--verde); background:rgba(119,223,64,.10);
    border:1px solid rgba(119,223,64,.28);
    padding:4px 10px; border-radius:999px; margin-bottom:10px;
  }
  .hero .badge::before{
    content:""; width:6px; height:6px; border-radius:50%;
    background:var(--verde); box-shadow:0 0 7px var(--verde);
  }
  .hero h2{ font-size:20px; font-weight:900; letter-spacing:-.5px; line-height:1.2; margin-bottom:6px; }
  .hero p{ font-size:12.5px; color:#c5d5f5; line-height:1.5; }

  .sec-kicker{
    font-size:10px; font-weight:800; letter-spacing:.12em; text-transform:uppercase;
    color:var(--azul); margin:4px 0 10px;
  }
  .folder-tab{
    display:flex; align-items:center; gap:13px;
    background:#fff;
    border:1px solid var(--borda);
    border-top:3px solid var(--azul);
    border-radius:12px;
    padding:15px 15px;
    margin-bottom:10px;
    cursor:pointer;
    box-shadow:0 3px 12px rgba(0,15,68,.05);
    transition:transform .12s ease;
  }
  .folder-tab:active{ transform:scale(.98); background:#fafcff; }
  .folder-code{
    font-family:'Inter', sans-serif;
    font-size:12px; font-weight:800;
    color:#fff;
    background:var(--azul);
    padding:6px 10px;
    border-radius:8px;
    min-width:40px; text-align:center;
    flex-shrink:0;
  }
  .folder-meta{ flex:1; min-width:0; }
  .folder-meta .name{
    font-weight:800; font-size:15.5px; color:var(--azul-escuro); line-height:1.25;
  }
  .folder-meta .count{
    font-size:11.5px; color:var(--muted); margin-top:2px; font-weight:600;
  }
  .chev{ color:var(--azul); opacity:.5; font-size:20px; }

  #view-folder{ display:none; padding:16px 16px 90px; overflow-y:auto; }
  .item-row{
    display:flex; align-items:center; gap:12px;
    background:#fff;
    border:1px solid var(--borda);
    border-radius:12px;
    padding:14px 14px;
    margin-bottom:9px;
    cursor:pointer;
    box-shadow:0 2px 8px rgba(0,15,68,.04);
    text-decoration:none;
    color:inherit;
  }
  .item-row:active{ background:var(--cinza); }
  .item-dot{ width:8px; height:8px; border-radius:50%; background:var(--verde); flex-shrink:0; }
  .item-title{ font-size:14.5px; font-weight:600; color:var(--texto); flex:1; }
  .item-open{ font-size:11.5px; color:var(--azul); font-weight:700; }
  .empty-state{ text-align:center; padding:48px 20px; color:var(--muted); }
  .empty-state .glyph{
    font-weight:900; font-size:30px; color:var(--azul); margin-bottom:10px;
  }
  .empty-state p{ font-size:13.5px; line-height:1.5; margin:0 auto; max-width:280px; }

  #view-frame{ display:none; flex:1; flex-direction:column; }
  #view-frame .frame-tools{
    display:flex; gap:10px; padding:10px 14px;
    background:var(--cinza); border-bottom:1px solid var(--borda);
  }
  #view-frame .frame-tools a{
    font-size:12.5px; font-weight:700; color:var(--azul); text-decoration:none;
    display:flex; align-items:center; gap:5px;
  }
  #view-frame iframe{ flex:1; width:100%; border:0; background:#fff; }

  #installToast{
    position:fixed; left:16px; right:16px; bottom:16px;
    background:var(--azul-escuro); color:#fff;
    border-radius:12px; padding:14px 16px;
    display:none; align-items:center; justify-content:space-between; gap:12px;
    box-shadow:0 8px 24px rgba(0,15,68,.35); z-index:50;
  }
  #installToast span{ font-size:13px; line-height:1.4; }
  #installToast button{
    background:var(--verde); border:0; color:var(--azul-escuro);
    padding:9px 14px; border-radius:8px; font-weight:800; font-size:13px;
    cursor:pointer; flex-shrink:0;
  }
</style>
</head>
<body>
<div id="app">

  <header class="top">
    <div class="backbar" id="headerBar">
      <svg class="brand-logo" viewBox="0 0 829 239" xmlns="http://www.w3.org/2000/svg" fill="none"><g clip-path="url(#clip0_231_831)"><path d="M262.484 51.3111L262.454 69.6176C251.799 54.993 236.46 48.5276 216.554 48.5276C198.57 48.5276 184.487 54.9194 171.748 68.1448C159.01 81.3849 152.833 96.9815 152.833 116.334C152.833 135.686 159.512 151.444 172.251 164.773C184.989 178.101 198.57 184.272 216.554 184.272C232.692 184.272 252.538 178.44 262.469 166.216C262.883 187.115 254.489 200.782 237.613 207.026C218.047 214.287 193.235 207.615 182.078 192.475L161.404 213.094C175.398 229.545 197.727 239 220.456 239C259.706 239 291.493 218.808 291.493 160.929V51.2964H262.484V51.3111ZM251.253 146.275C243.406 154.213 233.549 158.175 221.682 158.175C209.816 158.175 199.959 154.213 192.112 146.275C184.265 138.351 180.334 128.381 180.334 116.363C180.334 104.345 184.265 94.3747 192.112 86.4365C199.959 78.513 209.816 74.5513 221.682 74.5513C233.549 74.5513 243.406 78.513 251.253 86.4365C259.1 94.36 263.031 104.331 263.031 116.363C263.031 128.396 259.1 138.351 251.253 146.275Z" fill="#0068FF"></path><path d="M109.637 51.3112V69.8681C99.1147 55.5381 84.0562 48.3657 64.4756 48.3657C46.6831 48.3657 31.4915 54.9195 18.9008 68.0124C6.29535 81.1052 0 97.2173 0 116.334C0 135.45 6.29535 151.341 18.9008 164.523C31.5063 177.704 46.6979 184.287 64.4756 184.287C80.1992 184.287 99.6024 178.646 109.637 166.216V181.459H138.675V51.3112H109.637ZM98.3906 146.26C90.5288 154.184 80.672 158.145 68.7907 158.145C56.9093 158.145 47.0525 154.184 39.1907 146.26C31.3289 138.337 27.3981 128.351 27.3981 116.334C27.3981 104.316 31.3289 94.3454 39.1907 86.4072C47.0525 78.4837 56.9093 74.522 68.7907 74.522C80.672 74.522 90.5288 78.4837 98.3906 86.4072C106.252 94.3307 110.183 104.301 110.183 116.334C110.183 128.351 106.238 138.337 98.3906 146.26Z" fill="#0068FF"></path><path d="M322.57 37.526C332.959 37.526 341.382 29.1313 341.382 18.763C341.382 8.39475 332.959 0 322.57 0C312.182 0 303.773 8.39475 303.773 18.763C303.773       <div class="head-text">
        <div class="eyebrow" id="eyebrow">Hub de Entregas</div>
        <h1 id="pageTitle">Gestão &amp; Análises</h1>
      </div>
    </div>
  </header>

  <main>
    <div id="view-home">
      <div class="hero">
        <div class="hero-inner">
          <span class="badge">Painel consolidado</span>
          <h2>Entregas, análises e estudos<br>num único lugar.</h2>
          <p>Selecione uma área abaixo para acessar os materiais publicados.</p>
        </div>
      </div>
      <div class="sec-kicker">Áreas</div>
      <div id="folderList"></div>
    </div>
    <div id="view-folder"></div>
    <div id="view-frame">
      <div class="frame-tools">
        <a href="#" id="openExternal" target="_blank" rel="noopener">Abrir em nova aba</a>
      </div>
      <iframe id="contentFrame" title="conteudo"></iframe>
    </div>
  </main>

  <div id="installToast">
    <span>Instale este hub na tela inicial do seu celular para acesso rapido.</span>
    <button id="installBtn">Instalar</button>
  </div>
</div>

<script src="data.js"></script>
<script>
(function(){
  var $folderList = document.getElementById('folderList');
  var $home = document.getElementById('view-home');
  var $folder = document.getElementById('view-folder');
  var $frame = document.getElementById('view-frame');
  var $iframe = document.getElementById('contentFrame');
  var $openExternal = document.getElementById('openExternal');
  var $eyebrow = document.getElementById('eyebrow');
  var $title = document.getElementById('pageTitle');
  var $headerBar = document.getElementById('headerBar');

  function renderHome(){
    $home.style.display = 'block';
    $folder.style.display = 'none';
    $frame.style.display = 'none';
    $eyebrow.textContent = 'Hub de Entregas';
    $title.textContent = 'Gestão & Análises';
    var existingBack = $headerBar.querySelector('.backbtn');
    if (existingBack) existingBack.remove();

    $folderList.innerHTML = FOLDERS.map(function(f, i){
      return '<div class="folder-tab" data-idx="' + i + '">' +
        '<div class="folder-code">' + f.code + '</div>' +
        '<div class="folder-meta">' +
          '<div class="name">' + f.name + '</div>' +
          '<div class="count">' + f.items.length + ' ' + (f.items.length === 1 ? 'item' : 'itens') + '</div>' +
        '</div>' +
        '<div class="chev">&rsaquo;</div>' +
      '</div>';
    }).join('');

    var tabs = $folderList.querySelectorAll('.folder-tab');
    tabs.forEach(function(el){
      el.addEventListener('click', function(){ renderFolder(parseInt(el.dataset.idx)); });
    });
  }

  function addBackButton(onClick){
    if ($headerBar.querySelector('.backbtn')) return;
    var btn = document.createElement('button');
    btn.className = 'backbtn';
    btn.innerHTML = '&larr;';
    btn.addEventListener('click', onClick);
    $headerBar.prepend(btn);
  }

  function renderFolder(idx){
    var f = FOLDERS[idx];
    $home.style.display = 'none';
    $frame.style.display = 'none';
    $folder.style.display = 'block';
    $eyebrow.textContent = f.code + ' \u00b7 ' + f.items.length + ' itens';
    $title.textContent = f.name;
    addBackButton(renderHome);

    if (!f.items.length){
      $folder.innerHTML =
        '<div class="empty-state">' +
          '<div class="glyph">' + f.code + '</div>' +
          '<p>Nenhum item cadastrado ainda nesta pasta. Adicione URLs ou HTMLs em <strong>data.js</strong>.</p>' +
        '</div>';
      return;
    }

    $folder.innerHTML = f.items.map(function(it, i){
      if (it.openMode === 'external'){
        var src = it.url || it.html;
        return '<a class="item-row" href="' + src + '" target="_blank" rel="noopener">' +
          '<div class="item-dot"></div>' +
          '<div class="item-title">' + it.title + '</div>' +
          '<div class="item-open">nova aba &#8599;</div>' +
        '</a>';
      }
      return '<div class="item-row" data-idx="' + i + '">' +
        '<div class="item-dot"></div>' +
        '<div class="item-title">' + it.title + '</div>' +
        '<div class="item-open">abrir &rsaquo;</div>' +
      '</div>';
    }).join('');

    var rows = $folder.querySelectorAll('div.item-row');
    rows.forEach(function(el){
      el.addEventListener('click', function(){ renderViewer(f, parseInt(el.dataset.idx)); });
    });
  }

  function renderViewer(folder, itemIdx){
    var item = folder.items[itemIdx];
    var src = item.url || item.html;

    $home.style.display = 'none';
    $folder.style.display = 'none';
    $frame.style.display = 'flex';
    $eyebrow.textContent = folder.code + ' \u00b7 ' + folder.name;
    $title.textContent = item.title;
    addBackButton(function(){ renderFolder(FOLDERS.indexOf(folder)); });

    $iframe.src = src;
    $openExternal.href = src;
  }

  renderHome();

  var deferredPrompt;
  var toast = document.getElementById('installToast');
  var installBtn = document.getElementById('installBtn');
  window.addEventListener('beforeinstallprompt', function(e){
    e.preventDefault();
    deferredPrompt = e;
    toast.style.display = 'flex';
  });
  if (installBtn){
    installBtn.addEventListener('click', function(){
      toast.style.display = 'none';
      if (deferredPrompt){
        deferredPrompt.prompt();
        deferredPrompt.userChoice.then(function(){ deferredPrompt = null; });
      }
    });
  }
  window.addEventListener('appinstalled', function(){ toast.style.display = 'none'; });

  if ('serviceWorker' in navigator){
    window.addEventListener('load', function(){
      navigator.serviceWorker.register('sw.js').catch(function(){});
    });
  }
})();
</script>
</body>
</html>
